<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Z1NTY // Key Bypass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #0af;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }
        .fog-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .fog-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(0,120,255,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 50%, rgba(0,150,255,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(0,100,255,0.1) 0%, transparent 70%);
            animation: fogMove 10s ease-in-out infinite;
        }
        .fog-layer:nth-child(2) { animation-delay: -5s; opacity: 0.6; }
        @keyframes fogMove {
            0%, 100% { transform: scale(1) translateY(0); }
            25% { transform: scale(1.06) translateY(-1.5vh); }
            50% { transform: scale(1.03) translateY(1.5vh); }
            75% { transform: scale(1.05) translateY(-0.5vh); }
        }
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }
        .card {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 170, 255, 0.5);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 0 100px rgba(0, 170, 255, 0.3), inset 0 0 40px rgba(0, 170, 255, 0.08);
            text-align: center;
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        .neon-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 0 15px rgba(0, 170, 255, 0.8)) drop-shadow(0 0 30px rgba(0, 170, 255, 0.5));
            text-shadow: 0 0 20px #0af, 0 0 40px #0af, 0 0 60px #08c;
        }
        .glitch-title {
            font-size: clamp(26px, 5vw, 38px);
            font-weight: 900;
            letter-spacing: 6px;
            color: #0af;
            text-shadow: 0 0 25px #0af, 0 0 50px #0af, 0 0 70px #08c;
            margin-bottom: 8px;
            position: relative;
            display: inline-block;
            animation: glitch 2.5s infinite;
        }
        .glitch-title::before,
        .glitch-title::after {
            content: 'Z1NTY KEY BYPASS';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.6;
        }
        .glitch-title::before {
            color: #0af;
            z-index: -1;
            animation: glitch-anim-1 0.4s infinite alternate-reverse;
        }
        .glitch-title::after {
            color: #f0a;
            z-index: -2;
            animation: glitch-anim-2 0.5s infinite alternate-reverse;
        }
        @keyframes glitch-anim-1 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(25% 0 35% 0); transform: translate(-5px, 5px); }
            40% { clip-path: inset(55% 0 15% 0); transform: translate(5px, -4px); }
            60% { clip-path: inset(15% 0 65% 0); transform: translate(-4px, 4px); }
            80% { clip-path: inset(85% 0 8% 0); transform: translate(4px, -5px); }
        }
        @keyframes glitch-anim-2 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(65% 0 15% 0); transform: translate(5px, -5px); }
            40% { clip-path: inset(25% 0 55% 0); transform: translate(-5px, 4px); }
            60% { clip-path: inset(35% 0 45% 0); transform: translate(4px, 5px); }
            80% { clip-path: inset(8% 0 85% 0); transform: translate(-4px, -4px); }
        }
        .subtitle {
            font-size: 14px;
            color: rgba(0, 170, 255, 0.8);
            letter-spacing: 4px;
            margin-bottom: 35px;
            text-shadow: 0 0 12px rgba(0, 170, 255, 0.6);
            text-transform: uppercase;
        }
        .input-field {
            width: 100%;
            padding: 16px 22px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 170, 255, 0.5);
            border-radius: 50px;
            color: #0af;
            font-size: 15px;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.25), inset 0 0 15px rgba(0, 170, 255, 0.1);
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .input-field:focus {
            box-shadow: 0 0 50px rgba(0, 170, 255, 0.6), inset 0 0 25px rgba(0, 170, 255, 0.2);
            border-color: #4af;
            transform: scale(1.02);
        }
        .input-field::placeholder {
            color: rgba(0, 170, 255, 0.35);
            font-size: 13px;
            letter-spacing: 2px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 2px solid #0af;
            border-radius: 50px;
            color: #0af;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.4), inset 0 0 15px rgba(0, 170, 255, 0.1);
            text-shadow: 0 0 15px rgba(0, 170, 255, 0.8);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 170, 255, 0.5), transparent);
            transition: left 0.5s;
        }
        .btn:hover {
            background: #0af;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 70px #0af, 0 0 100px #0af;
            transform: scale(1.04);
            text-shadow: none;
            letter-spacing: 6px;
        }
        .btn:hover::before { left: 100%; }
        .btn:active { transform: scale(0.97); }
        .footer {
            margin-top: 30px;
            color: rgba(0, 100, 180, 0.7);
            font-size: 12px;
            letter-spacing: 3px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 100, 180, 0.5);
        }
    </style>
</head>
<body>
    <div class="fog-container"><div class="fog-layer"></div><div class="fog-layer"></div></div>

    <div class="main-container">
        <div class="card">
            <span class="neon-icon">🔑</span>
            <div class="glitch-title">Z1NTY KEY BYPASS</div>
            <div class="subtitle">Мгновенный обход ключей</div>
            
            <input type="text" class="input-field" id="linkInput" placeholder="Вставь ссылку auth.platorelay.com...">
            <button class="btn" onclick="startBypass()">🔓 ОБОЙТИ</button>
        </div>
        <div class="footer">█ Z1NTY PROJECT // BYPASS EDITION █</div>
    </div>

    <script>
        function startBypass() {
            const link = document.getElementById('linkInput').value.trim();
            if (!link) {
                alert('Вставь ссылку для обхода!');
                return;
            }

            // Открываем bypass.tools с уже вставленной ссылкой
            const bypassUrl = `https://bypass.tools/?url=${encodeURIComponent(link)}`;
            const newWindow = window.open(bypassUrl, '_blank');

            // Пытаемся автоматически нажать кнопку Bypass после загрузки
            if (newWindow) {
                setTimeout(() => {
                    try {
                        newWindow.postMessage({ action: 'bypass' }, '*');
                        
                        // Альтернативный способ: вставляем скрипт в новое окно
                        const script = `
                            (function() {
                                setTimeout(function() {
                                    var buttons = document.querySelectorAll('button');
                                    for (var i = 0; i < buttons.length; i++) {
                                        if (buttons[i].textContent.toLowerCase().indexOf('bypass') !== -1 ||
                                            buttons[i].textContent.toLowerCase().indexOf('submit') !== -1 ||
                                            buttons[i].type === 'submit') {
                                            buttons[i].click();
                                            break;
                                        }
                                    }
                                }, 2500);
                            })();
                        `;
                        
                        // Пробуем выполнить скрипт в новом окне
                        const scriptEl = newWindow.document.createElement('script');
                        scriptEl.textContent = script;
                        newWindow.document.body.appendChild(scriptEl);
                    } catch (e) {
                        console.log('Автоклик не сработал, пользователь нажмёт вручную');
                    }
                }, 3000);
            }
        }

        document.getElementById('linkInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startBypass();
        });

        console.log('✅ Z1NTY Key Bypass загружен!');
    </script>
</body>
</html>
